author: openclaw-community
description: 'Control and query Home Assistant via natural language. Covers lights,
  switches, climate, temperature sensors, cameras, automations, energy monitoring,
  EV chargers, presence detection, and home summaries. Credentials are loaded from
  your OpenClaw environment - no tokens in the skill file itself.

  '
license: MIT
main: skill/SKILL.md
name: home-assistant-skill
requires:
  env:
  - description: Your Home Assistant URL (e.g. http://homeassistant.local:8123)
    name: HOME_ASSISTANT_URL
  - description: Long-lived access token from HA Profile > Security > Long-Lived Access
      Tokens
    name: HOME_ASSISTANT_TOKEN
  optional_env:
  - description: Set to 'false' if using a self-signed certificate
    name: HOME_ASSISTANT_SSL_VERIFY
  - description: Path to CA certificate file for HTTPS with self-signed certs
    name: HOME_ASSISTANT_CA_CERT
  python_packages:
  - requests
  - urllib3
security:
  credential_handling: user-supplied-only
  network_access: user-own-home-assistant-only
  note: 'This skill connects only to the Home Assistant instance you configure via
    HOME_ASSISTANT_URL. All credentials are supplied by the user in their openclaw.json
    env block and are used only to call the HA REST API on your own server. No data
    is sent to third parties. The long-lived token grants access equivalent to your
    HA user account - use a dedicated HA user with only the permissions needed.

    '
  scope: owner-operated
tags:
- home-assistant
- smart-home
- lights
- climate
- cameras
- automation
- energy
- iot
- heating
- telegram
- latest
version: 2.1.0
